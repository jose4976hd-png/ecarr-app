<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,user-scalable=yes,viewport-fit=cover">
<title>Despiece — Ecarr</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--verde:#7AB800;--azul:#0D3C4A;--azul-medio:#164455;--azul-claro:#1E5568;--texto:#F0F8FA;--gris:#7AABB8;--rojo:#E63535;--amarillo:#FFB400}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--azul);color:var(--texto);font-family:'Barlow',sans-serif;min-height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{background:var(--azul-medio);border-bottom:2px solid var(--amarillo);padding:10px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.back-btn{-webkit-appearance:none;background:rgba(255,255,255,.1);border:none;color:var(--texto);font-size:1rem;width:36px;height:36px;border-radius:50%;cursor:pointer;flex-shrink:0}
.h-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1.2rem;text-transform:uppercase;color:var(--amarillo);flex:1}
.h-subtitle{font-size:.7rem;color:var(--gris);margin-top:1px}
.tec-link{-webkit-appearance:none;background:rgba(122,184,0,.12);border:1px solid var(--verde);border-radius:6px;color:var(--verde);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.75rem;text-transform:uppercase;padding:7px 10px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:4px;flex-shrink:0}
/* TABS */
.tabs-bar{display:flex;background:var(--azul-medio);border-bottom:2px solid var(--azul-claro);flex-shrink:0}
.tab-btn{-webkit-appearance:none;flex:1;padding:13px 6px;background:transparent;border:none;border-bottom:3px solid transparent;color:var(--gris);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.9rem;text-transform:uppercase;cursor:pointer;margin-bottom:-2px;white-space:nowrap}
.tab-btn.active{color:var(--amarillo);border-bottom-color:var(--amarillo)}
.tab-pane{display:none;flex:1;overflow:hidden;flex-direction:column}
.tab-pane.active{display:flex}
/* DESPIECE NAVEGADOR */
.nav-bar{background:#112e3a;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--azul-claro);flex-shrink:0}
.nav-titulo{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1rem;color:var(--texto);text-transform:uppercase}
.nav-contador{font-size:.78rem;color:var(--gris)}
.nav-btns{display:flex;gap:8px}
.nav-btn{-webkit-appearance:none;background:var(--azul-medio);border:1px solid var(--azul-claro);border-radius:6px;color:var(--texto);font-size:1rem;width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.nav-btn:disabled{opacity:.3;cursor:default}
.img-scroll{flex:1;overflow:hidden;background:#fff;position:relative;touch-action:none}
.desp-canvas{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform;width:100%}
.desp-img{width:100%;display:block;-webkit-user-drag:none;user-select:none}
.pag-dots{display:flex;justify-content:center;gap:6px;padding:10px;background:#112e3a;flex-shrink:0}
.dot{width:8px;height:8px;border-radius:50%;background:var(--azul-claro);cursor:pointer;flex-shrink:0}
.dot.active{background:var(--amarillo)}
/* TARIFA */
.tarifa-scroll{flex:1;overflow:auto;-webkit-overflow-scrolling:touch;background:#fff}
.tarifa-scroll img{min-width:100%;display:block}
.tarifa-nav{display:flex;justify-content:center;gap:10px;padding:8px;background:#112e3a;flex-shrink:0}
.tarifa-btn{-webkit-appearance:none;padding:8px 20px;border:1px solid var(--azul-claro);border-radius:6px;background:var(--azul-medio);color:var(--texto);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.9rem;cursor:pointer}
.tarifa-btn.active{background:var(--amarillo);color:#333;border-color:var(--amarillo)}
</style>
</head>
<body>

<header>
  <button class="back-btn" onclick="history.back()">←</button>
  <div>
    <div class="h-title">🔧 Despiece — Ecarr</div>
    <div class="h-subtitle">Vistas explosionadas · Tarifa de piezas</div>
  </div>
  <a class="tec-link" href="https://script.google.com/macros/s/AKfycbzESKFRjU_j5V1ltvr-l1QzgFCL61D0fDQ12x5agVbZRWnulbhhUkP2LOzZRMS9gRym/exec?page=tecnico" target="_top">⚡ Técnico →</a>
</header>

<div class="tabs-bar">
  <button class="tab-btn active" onclick="switchTab('desp')">🔧 Despiece</button>
  <button class="tab-btn" onclick="switchTab('tarifa')">📋 Tarifa</button>
</div>

<!-- TAB DESPIECE -->
<div class="tab-pane active" id="pane-desp">
  <div class="nav-bar">
    <div>
      <div class="nav-titulo" id="desp-titulo">Vista general</div>
      <div class="nav-contador" id="desp-counter">Pág 1 de 3</div>
    </div>
    <div class="nav-btns">
      <button class="nav-btn" id="btn-prev" onclick="navDesp(-1)" disabled>←</button>
      <button class="nav-btn" id="btn-next" onclick="navDesp(1)">→</button>
    </div>
  </div>
  <div class="img-scroll" id="desp-wrap">
    <div class="desp-canvas" id="desp-canvas">
      <img class="desp-img" id="desp-img" src="" alt="Despiece">
    </div>
  </div>
  <div class="pag-dots" id="pag-dots"></div>
</div>

<!-- TAB TARIFA -->
<div class="tab-pane" id="pane-tarifa">
  <div class="tarifa-nav">
    <button class="tarifa-btn active" id="tbtn-1" onclick="switchTarifa(1)">Pág 1</button>
    <button class="tarifa-btn" id="tbtn-2" onclick="switchTarifa(2)">Pág 2</button>
  </div>
  <div class="tarifa-scroll">
    <img id="tarifa-img" src="" style="width:100%;display:block" alt="Tarifa Ecarr 2023">
  </div>
</div>

var paginaActual = 0;

function renderDesp() {
  var p = PAGINAS[paginaActual];
  document.getElementById('desp-img').src = p.img;
  document.getElementById('desp-titulo').textContent = p.titulo;
  document.getElementById('desp-counter').textContent = 'Pág '+(paginaActual+1)+' de '+PAGINAS.length;
  document.getElementById('btn-prev').disabled = paginaActual === 0;
  document.getElementById('btn-next').disabled = paginaActual === PAGINAS.length-1;
  document.querySelectorAll('.dot').forEach(function(d,i){
    d.classList.toggle('active', i === paginaActual);
  });
  // Scroll y zoom al inicio al cambiar de página
  if (window._resetZoomDesp) window._resetZoomDesp();
}

function navDesp(dir) {
  var nueva = paginaActual + dir;
  if (nueva < 0 || nueva >= PAGINAS.length) return;
  paginaActual = nueva;
  renderDesp();
}

// Crear dots
(function() {
  var dots = document.getElementById('pag-dots');
  PAGINAS.forEach(function(p, i) {
    var d = document.createElement('div');
    d.className = 'dot' + (i===0?' active':'');
    d.onclick = function() { paginaActual=i; renderDesp(); };
    dots.appendChild(d);
  });
})();

// Swipe gestual para cambiar página (solo con 1 dedo y sin zoom activo)
(function() {
  var wrap = document.getElementById('desp-wrap');
  var startX = 0, startY = 0;
  wrap.addEventListener('touchstart', function(e) {
    if (e.touches.length === 1) {
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
    }
  }, {passive: true});
  wrap.addEventListener('touchend', function(e) {
    if (e.changedTouches.length === 1 && window._despScale && window._despScale() <= 1.05) {
      var dx = e.changedTouches[0].clientX - startX;
      var dy = Math.abs(e.changedTouches[0].clientY - startY);
      if (Math.abs(dx) > 50 && dy < 60) navDesp(dx < 0 ? 1 : -1);
    }
  }, {passive: true});
})();

renderDesp();

// ── PINCH-ZOOM DESPIECE ──────────────────────────────────────
(function() {
  var wrap   = document.getElementById('desp-wrap');
  var canvas = document.getElementById('desp-canvas');

var tarifaActual = 1;

function switchTarifa(n) {
  tarifaActual = n;
  document.getElementById('tarifa-img').src = TARIFAS[n-1];
  document.getElementById('tbtn-1').classList.toggle('active', n===1);
  document.getElementById('tbtn-2').classList.toggle('active', n===2);
}
switchTarifa(1);

// ── TABS ─────────────────────────────────────────────────────
function switchTab(t) {
  document.querySelectorAll('.tab-btn').forEach(function(b){
    b.classList.toggle('active', b.getAttribute('onclick').indexOf("'"+t+"'") >= 0);
  });
  document.querySelectorAll('.tab-pane').forEach(function(p){
    p.classList.toggle('active', p.id === 'pane-'+t);
  });
}
</script>
